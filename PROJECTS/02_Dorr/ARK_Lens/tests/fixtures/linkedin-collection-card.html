<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>LinkedIn collection card fixture</title>
  </head>
  <body>
    <main id="workspace">
      <section aria-label="Top job picks for you">
        <article role="listitem" aria-selected="true">
          <button aria-label="More options">More</button>
          <h3>Customer Service Representative</h3>
          <p>Percepta</p>
          <p>Sydney, New South Wales, Australia</p>
          <p>4 hours ago · 23 applicants</p>
          <button aria-label="Dismiss Customer Service Representative job">Dismiss</button>
        </article>
        <article role="listitem">
          <button aria-label="More options">More</button>
          <h3 id="actual-job-card-title">Head of Data Engineering</h3>
          <p>Jobgether</p>
          <p>Australia</p>
          <p>6 days ago - 83 applicants</p>
          <button aria-label="Dismiss Head of Data Engineering job">Dismiss</button>
        </article>
      </section>
    </main>
  </body>
</html>
